name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger from the Actions tab
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Base Metrics (Overview, Commits, Stars, Repositories)
      - name: Base Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/github-metrics.svg
          user: Padmapriyan27
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Kolkata
          config_order: header, activity, community, repositories

      # 2. Languages Metrics (Most used languages and sizes)
      - name: Language Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/github-languages.svg
          user: Padmapriyan27
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: bytes-size, percentages
          plugin_languages_limit: 8
          config_timezone: Asia/Kolkata

      # 3. Coding Habits & Productive Time
      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/github-habits.svg
          user: Padmapriyan27
          base: ""
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: Asia/Kolkata

      # 4. Isometric Contribution Calendar (3D graph of activity)
      - name: Isometric Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          filename: assets/github-isocalendar.svg
          user: Padmapriyan27
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Kolkata
