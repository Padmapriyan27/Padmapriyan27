name: Update Profile SVGs

on:
  schedule:
    - cron: "0 */6 * * *" # Runs every 6 hours
  workflow_dispatch: # Allows manual trigger
  push:
    branches:
      - main
      - master

jobs:
  update-svgs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the updated SVGs back

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Profile Updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python update_profile.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/about.svg assets/projects.svg
          # Only commit and push if there are actual changes in the SVGs
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update dynamic SVG profile metrics [skip ci]" && git push)
