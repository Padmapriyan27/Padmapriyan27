<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 260" width="100%" height="260">
  <defs>
    <!-- Import Google Fonts for futuristic monospace and headers -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&amp;family=Share+Tech+Mono&amp;display=swap');

      /* GLOBAL AND HUD VARIABLES */
      :root {
        --color-bg: #030402;
        --color-border: #0d2e0f;
        --color-border-glow: #143d0b;
        --color-accent-lime: #9CFF2E;
        --color-accent-yellow: #D4FF00;
        --color-active: #B8FF66;
        --color-dark-green: #0a1a08;
      }

      /* ANIMATIONS */
      @keyframes scanline {
        0% { transform: translateY(-260px); }
        100% { transform: translateY(260px); }
      }

      @keyframes radar-rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes blink-dot-1 {
        0%, 100% { opacity: 0.1; }
        7.5% { opacity: 1; filter: drop-shadow(0 0 4px var(--color-accent-yellow)); }
        40% { opacity: 0.2; }
      }

      @keyframes blink-dot-2 {
        0%, 100% { opacity: 0.1; }
        67% { opacity: 1; filter: drop-shadow(0 0 4px var(--color-accent-lime)); }
        90% { opacity: 0.2; }
      }

      @keyframes cursor-blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }

      @keyframes waveform-flow {
        from { stroke-dashoffset: 240; }
        to { stroke-dashoffset: 0; }
      }

      @keyframes matrix-pulse {
        0%, 100% { fill: #071506; }
        50% { fill: var(--color-accent-lime); filter: drop-shadow(0 0 2px var(--color-accent-lime)); }
      }

      @keyframes neon-glow {
        0%, 100% {
          text-shadow: 0 0 8px rgba(156, 255, 46, 0.6), 0 0 15px rgba(212, 255, 0, 0.4);
        }
        50% {
          text-shadow: 0 0 14px rgba(156, 255, 46, 0.9), 0 0 25px rgba(212, 255, 0, 0.6);
        }
      }

      @keyframes status-pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }

      /* STYLE CLASSES */
      .hud-bg {
        fill: #030402;
      }

      .hud-grid {
        fill: url(#gridPattern);
        opacity: 0.15;
      }

      .hud-frame {
        fill: none;
        stroke: #0d2e0f;
        stroke-width: 1.5;
      }

      .hud-accent {
        fill: var(--color-accent-lime);
      }

      .hud-accent-yellow {
        fill: var(--color-accent-yellow);
      }

      .radar-line {
        stroke: #0d2e0f;
        stroke-width: 1;
        fill: none;
      }

      .radar-sweep {
        transform-origin: 110px 130px;
        animation: radar-rotate 4s linear infinite;
      }

      .radar-dot-1 {
        animation: blink-dot-1 4s infinite;
      }

      .radar-dot-2 {
        animation: blink-dot-2 4s infinite;
      }

      .text-orbitron {
        font-family: 'Orbitron', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 800;
      }

      .text-mono {
        font-family: 'Share Tech Mono', 'Courier New', Courier, monospace;
      }

      .title-glowing {
        fill: var(--color-accent-yellow);
        font-size: 34px;
        letter-spacing: 4px;
        animation: neon-glow 3s ease-in-out infinite;
      }

      .console-header {
        fill: #4c8a3c;
        font-size: 11px;
        letter-spacing: 2px;
      }

      .console-text {
        fill: var(--color-accent-lime);
        font-size: 13.5px;
        letter-spacing: 0.5px;
      }

      .console-text-dim {
        fill: #4c8a3c;
        font-size: 13.5px;
        letter-spacing: 0.5px;
      }

      .console-cursor {
        animation: cursor-blink 1s infinite;
      }

      .scope-line {
        fill: none;
        stroke: #0d2e0f;
        stroke-width: 1;
      }

      .scope-wave {
        fill: none;
        stroke: var(--color-accent-lime);
        stroke-width: 1.5;
        stroke-dasharray: 40 80;
        animation: waveform-flow 3s linear infinite;
      }

      .matrix-node {
        animation: matrix-pulse 2s infinite ease-in-out;
      }

      .scan-line {
        fill: url(#scanGradient);
        opacity: 0.04;
        pointer-events: none;
        animation: scanline 6s linear infinite;
      }

      .panel-title {
        fill: #4c8a3c;
        font-size: 10px;
        letter-spacing: 1px;
        font-weight: 600;
      }

      .status-active {
        fill: var(--color-accent-lime);
        animation: status-pulse 1.5s infinite;
      }
    </style>

    <!-- Background Grid Pattern -->
    <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0d2e0f" stroke-width="0.5" />
    </pattern>

    <!-- Scanline Sweep Gradient -->
    <linearGradient id="scanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9CFF2E" stop-opacity="0" />
      <stop offset="50%" stop-color="#9CFF2E" stop-opacity="1" />
      <stop offset="100%" stop-color="#9CFF2E" stop-opacity="0" />
    </linearGradient>

    <!-- Radar Sweep Wedge Gradient -->
    <radialGradient id="radarSweep" cx="110" cy="130" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9CFF2E" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#9CFF2E" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#9CFF2E" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background Layer -->
  <rect width="850" height="260" class="hud-bg" />
  <rect width="850" height="260" class="hud-grid" />

  <!-- outer frame brackets -->
  <g>
    <!-- Top-Left Corner Bracket -->
    <path d="M 12 30 L 12 12 L 30 12" class="hud-frame" stroke-width="2" />
    <rect x="12" y="12" width="4" height="4" class="hud-accent" />
    
    <!-- Top-Right Corner Bracket -->
    <path d="M 838 30 L 838 12 L 820 12" class="hud-frame" stroke-width="2" />
    <rect x="834" y="12" width="4" height="4" class="hud-accent" />
    
    <!-- Bottom-Left Corner Bracket -->
    <path d="M 12 230 L 12 248 L 30 248" class="hud-frame" stroke-width="2" />
    <rect x="12" y="244" width="4" height="4" class="hud-accent" />
    
    <!-- Bottom-Right Corner Bracket -->
    <path d="M 838 230 L 838 248 L 820 248" class="hud-frame" stroke-width="2" />
    <rect x="834" y="244" width="4" height="4" class="hud-accent" />
  </g>

  <!-- Panels Sub-borders -->
  <g stroke="#0d2e0f" stroke-width="1" fill="none">
    <!-- Left Radar Panel Border -->
    <rect x="25" y="25" width="170" height="210" rx="3" />
    <!-- Middle Console Panel Border -->
    <rect x="210" y="25" width="430" height="210" rx="3" />
    <!-- Right Telemetry Panel Border -->
    <rect x="655" y="25" width="170" height="210" rx="3" />
  </g>

  <!-- PANEL HEADERS -->
  <g class="text-orbitron">
    <text x="35" y="42" class="panel-title">[01-RADAR-SCAN]</text>
    <text x="220" y="42" class="panel-title">[02-SECURITY-CONSOLE]</text>
    <text x="665" y="42" class="panel-title">[03-DIAG-WAVE]</text>
  </g>

  <!-- ==================== LEFT PANEL: RADAR ==================== -->
  <g>
    <!-- Radar Grid Circles -->
    <circle cx="110" cy="130" r="70" class="radar-line" />
    <circle cx="110" cy="130" r="50" class="radar-line" stroke-dasharray="2 4" />
    <circle cx="110" cy="130" r="30" class="radar-line" />
    <circle cx="110" cy="130" r="10" class="radar-line" />
    
    <!-- Radar Crosshairs -->
    <line x1="40" y1="130" x2="180" y2="130" class="radar-line" />
    <line x1="110" y1="60" x2="110" y2="200" class="radar-line" />
    
    <!-- Rotating Sweep Wedge -->
    <path d="M 110 130 L 110 60 A 70 70 0 0 1 159.5 80.5 Z" fill="url(#radarSweep)" class="radar-sweep" />
    
    <!-- Synchronized Blinking Targets -->
    <!-- Target 1: Top-Right Quadrant (Approx 26.5 deg, Delay: 0.3s) -->
    <circle cx="130" cy="90" r="3" fill="var(--color-accent-yellow)" class="radar-dot-1" style="animation-delay: 0.3s;" />
    <circle cx="130" cy="90" r="6" stroke="var(--color-accent-yellow)" stroke-width="0.5" fill="none" class="radar-dot-1" style="animation-delay: 0.3s;" />
    
    <!-- Target 2: Bottom-Left Quadrant (Approx 241 deg, Delay: 2.68s) -->
    <circle cx="65" cy="155" r="3" fill="var(--color-accent-lime)" class="radar-dot-2" style="animation-delay: 2.68s;" />
    <circle cx="65" cy="155" r="6" stroke="var(--color-accent-lime)" stroke-width="0.5" fill="none" class="radar-dot-2" style="animation-delay: 2.68s;" />

    <!-- Radar Coordinates overlay -->
    <text x="110" y="215" class="text-mono" font-size="9" fill="#4c8a3c" text-anchor="middle">COORD: 11.23N / 72.84E</text>
    <text x="110" y="225" class="text-mono" font-size="8" fill="#4c8a3c" text-anchor="middle">SWEEP IN PROGRESS...</text>
  </g>

  <!-- ==================== MIDDLE PANEL: CONSOLE ==================== -->
  <!-- Centered Identity & Hacker Console Lines -->
  <g transform="translate(425, 0)">
    <!-- Center Title vertically at y="125" -->
    <text x="0" y="125" class="text-orbitron title-glowing" text-anchor="middle">0xD4rkEYe</text>
    
    <!-- Center Subtitle vertically at y="155" -->
    <text x="0" y="155" class="text-mono" font-size="12" fill="#B8FF66" text-anchor="middle">CYBERSECURITY RESEARCHER &amp; OFFENSIVE OPERATOR</text>
  </g>

  <!-- Decorative crosshairs in middle console -->
  <path d="M 215 30 L 225 30" stroke="#0d2e0f" />
  <path d="M 215 30 L 215 40" stroke="#0d2e0f" />
  <path d="M 635 30 L 625 30" stroke="#0d2e0f" />
  <path d="M 635 30 L 635 40" stroke="#0d2e0f" />
  <path d="M 215 230 L 225 230" stroke="#0d2e0f" />
  <path d="M 215 230 L 215 220" stroke="#0d2e0f" />
  <path d="M 635 230 L 625 230" stroke="#0d2e0f" />
  <path d="M 635 230 L 635 220" stroke="#0d2e0f" />

  <!-- ==================== RIGHT PANEL: TELEMETRY ==================== -->
  <g transform="translate(655, 0)">
    <!-- Oscilloscope Frame -->
    <rect x="15" y="55" width="140" height="60" class="scope-line" rx="2" />
    <line x1="15" y1="85" x2="155" y2="85" class="scope-line" stroke-dasharray="2 2" />
    <line x1="85" y1="55" x2="85" y2="115" class="scope-line" stroke-dasharray="2 2" />
    
    <!-- Oscilloscope Flowing Wave -->
    <g clip-path="url(#scopeClip)">
      <path class="scope-wave" d="M 15 85 Q 25 60 35 85 T 55 85 T 75 85 T 95 85 T 115 85 T 135 85 T 155 85" />
      <!-- Duplicate path shifted to make seamless scrolling -->
      <path class="scope-wave" d="M -105 85 Q -95 60 -85 85 T -65 85 T -45 85 T -25 85 T -5 85 T 15 85 T 35 85" style="animation-delay: -1.5s;" />
    </g>
    
    <clipPath id="scopeClip">
      <rect x="16" y="56" width="138" height="58" />
    </clipPath>

    <!-- Grid Matrix (Computing Nodes simulation) -->
    <!-- 4x4 Grid of nodes that flash randomly -->
    <g transform="translate(15, 125)">
      <!-- Row 1 -->
      <rect x="0" y="0" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.1s; animation-duration: 1.4s;" />
      <rect x="12" y="0" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.6s; animation-duration: 2.1s;" />
      <rect x="24" y="0" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 1.2s; animation-duration: 1.8s;" />
      <rect x="36" y="0" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.3s; animation-duration: 2.5s;" />
      
      <!-- Row 2 -->
      <rect x="0" y="12" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 1.5s; animation-duration: 1.7s;" />
      <rect x="12" y="12" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.2s; animation-duration: 1.3s;" />
      <rect x="24" y="12" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.9s; animation-duration: 2.2s;" />
      <rect x="36" y="12" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.7s; animation-duration: 1.9s;" />
      
      <!-- Row 3 -->
      <rect x="0" y="24" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.5s; animation-duration: 2.0s;" />
      <rect x="12" y="24" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 1.1s; animation-duration: 1.6s;" />
      <rect x="24" y="24" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 0.4s; animation-duration: 2.4s;" />
      <rect x="36" y="24" width="8" height="8" rx="1.5" class="matrix-node" style="animation-delay: 1.7s; animation-duration: 1.5s;" />
    </g>

    <!-- Side Stats/Data -->
    <g transform="translate(65, 125)" class="text-mono" font-size="9" fill="#4c8a3c">
      <text x="0" y="8">&gt; FREQ: 2.44GHz</text>
      <text x="0" y="20">&gt; LOSS: 0.00%</text>
      <text x="0" y="32">&gt; CHNL: RedOps</text>
    </g>

    <!-- Diagnostics Checklist (Bottom right) -->
    <g transform="translate(15, 172)" class="text-mono" font-size="9.5">
      <!-- Item 1 -->
      <rect x="0" y="0" width="6" height="6" fill="var(--color-accent-lime)" />
      <text x="12" y="7" fill="var(--color-accent-lime)">[+] EXP_DEV: ON</text>
      
      <!-- Item 2 -->
      <rect x="0" y="14" width="6" height="6" fill="var(--color-accent-lime)" />
      <text x="12" y="21" fill="var(--color-accent-lime)">[+] WAF_BYPASS: OK</text>
      
      <!-- Item 3 -->
      <rect x="0" y="28" width="6" height="6" fill="var(--color-accent-yellow)" />
      <text x="12" y="35" fill="var(--color-accent-yellow)">[*] FRAPPE_DB: STABLE</text>
      
      <!-- Item 4 -->
      <rect x="0" y="42" width="6" height="6" fill="var(--color-accent-lime)" />
      <text x="12" y="49" fill="var(--color-accent-lime)">[+] ROOT_ACCESS: YES</text>
    </g>
  </g>

  <!-- Scanning Sweep Overlay Line -->
  <rect width="850" height="15" class="scan-line" />
</svg>
