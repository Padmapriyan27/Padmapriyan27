<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="100%" height="120">
  <defs>
    <!-- Gradient for the outer cooler flame layer -->
    <linearGradient id="glowGradOuter" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0a1a08" />
      <stop offset="50%" stop-color="#9CFF2E" />
      <stop offset="100%" stop-color="#D4FF00" />
    </linearGradient>

    <!-- Gradient for the inner hotter flame layer -->
    <linearGradient id="glowGradInner" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#0a1a08" />
      <stop offset="40%" stop-color="#D4FF00" />
      <stop offset="100%" stop-color="#FFFFFF" />
    </linearGradient>

    <!-- Gradient for the foreground text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#E6FF80" />
      <stop offset="70%" stop-color="#D4FF00" />
      <stop offset="100%" stop-color="#9CFF2E" />
    </linearGradient>

    <!-- Flame displacement filter 1 (Inner Flame) -->
    <filter id="flame-filter-1" x="-20%" y="-50%" width="140%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.06" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" dur="1.8s" repeatCount="indefinite"
                 values="0.015 0.06; 0.02 0.1; 0.015 0.06" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feGaussianBlur in="displaced" stdDeviation="4" />
    </filter>

    <!-- Flame displacement filter 2 (Outer Flame - More distorted) -->
    <filter id="flame-filter-2" x="-20%" y="-50%" width="140%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.04" numOctaves="2" result="noise">
        <animate attributeName="baseFrequency" dur="1.2s" repeatCount="indefinite"
                 values="0.01 0.04; 0.015 0.08; 0.01 0.04" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="30" xChannelSelector="R" yChannelSelector="G" result="displaced" />
      <feGaussianBlur in="displaced" stdDeviation="6" />
    </filter>

    <!-- Subtle warp for the foreground text -->
    <filter id="subtle-warp">
      <feTurbulence type="fractalNoise" baseFrequency="0.005 0.02" numOctaves="1" result="noise">
        <animate attributeName="baseFrequency" dur="3s" repeatCount="indefinite"
                 values="0.005 0.02; 0.008 0.03; 0.005 0.02" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>

  <style>
    .glow-outer {
      fill: url(#glowGradOuter);
      filter: url(#flame-filter-2);
      opacity: 0.5;
      transform-origin: 0px 0px;
      animation: flicker-outer 1.5s infinite alternate ease-in-out;
    }
    
    .glow-inner {
      fill: url(#glowGradInner);
      filter: url(#flame-filter-1);
      opacity: 0.8;
      transform-origin: 0px 0px;
      animation: flicker-inner 1s infinite alternate ease-in-out;
    }
    
    .front-text {
      fill: url(#textGrad);
      filter: url(#subtle-warp) drop-shadow(0 2px 6px rgba(212, 255, 0, 0.6));
      transform-origin: 0px 0px;
      animation: flicker-front 2s infinite alternate ease-in-out;
    }

    @keyframes flicker-outer {
      0% {
        transform: scale(0.98, 0.95) translate(0px, 2px);
      }
      100% {
        transform: scale(1.03, 1.08) translate(1px, -8px);
      }
    }

    @keyframes flicker-inner {
      0% {
        transform: scale(0.99, 0.97) translate(0px, 1px);
      }
      100% {
        transform: scale(1.02, 1.04) translate(-1px, -5px);
      }
    }

    @keyframes flicker-front {
      0% {
        transform: scale(1) translate(0px, 0px);
      }
      100% {
        transform: scale(1.003) translate(0px, -1px);
      }
    }
  </style>

  <!-- Container for centering elements relative to (300, 70) -->
